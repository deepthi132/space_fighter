<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

  <!-- Soft pink blob — bottom-left corner -->
  <path d="M 0 900 L 0 535 C 45 492 110 508 162 565 C 214 622 228 740 198 838 C 178 886 100 912 0 900 Z"
